# 開発環境用オーバーライド（developブランチのリリース前チェック用・コーディングはしない）
# ローカル: docker compose -p pokenae-dev -f docker-compose.yml -f docker-compose.dev.yml up -d --build
# CI/CD:    docker compose -p pokenae-dev -f docker-compose.yml -f docker-compose.dev.yml up -d
version: '3.8'

services:
  app:
    env_file:
      - .env.docker.development
    # CI/CD では GHCR から pull したイメージを使用（環境変数 IMAGE で指定）
    # ローカルでは build セクションが優先される
    image: ${IMAGE:-}
    build:
      target: runner
      args:
        NEXT_PUBLIC_ENVIRONMENT: development
    container_name: pokenae-web-dev
    ports:
      - "${PORT:-3002}:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3002}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      USER_API_BASE_URL: ${USER_API_BASE_URL:-}
      API_SERVICES: ${API_SERVICES:-}
      API_SERVICE_1_BASE_URL: ${API_SERVICE_1_BASE_URL:-}
      API_SERVICE_2_BASE_URL: ${API_SERVICE_2_BASE_URL:-}
      API_SERVICE_3_BASE_URL: ${API_SERVICE_3_BASE_URL:-}
      API_SERVICE_1_API_KEY: ${API_SERVICE_1_API_KEY:-}
      API_SERVICE_2_API_KEY: ${API_SERVICE_2_API_KEY:-}
      API_SERVICE_3_API_KEY: ${API_SERVICE_3_API_KEY:-}
      USER_API_API_KEY: ${USER_API_API_KEY:-}
      ADMIN_ALLOWED_EMAILS: ${ADMIN_ALLOWED_EMAILS:-}
      ADMIN_EMAIL_ALLOWLIST: ${ADMIN_EMAIL_ALLOWLIST:-}
    restart: unless-stopped
    # コンテナのリソース制限（本番より厳しく設定）
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
        reservations:
          cpus: '0.01'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/auth/session || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
