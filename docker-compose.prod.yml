# 本番環境用オーバーライド
# ローカル: docker compose -p pokenae-prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# CI/CD:    docker compose -p pokenae-prod -f docker-compose.yml -f docker-compose.prod.yml up -d
version: '3.8'

services:
  app:
    # CI/CD では GHCR から pull したイメージを使用（環境変数 IMAGE で指定）
    # ローカルでは build セクションが優先される
    image: ${IMAGE:-}
    build:
      target: runner
      args:
        NEXT_PUBLIC_ENVIRONMENT: production
    container_name: pokenae-web-prod
    ports:
      - "${PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    # always: VPS 再起動後も自動起動し、クラッシュ時も常に再起動する
    restart: always
    # コンテナのリソース制限
    # Node.js RSS (V8ヒープ384M + 非ヒープ) を考慮して 768M に設定
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    # ヘルスチェック失敗時はコンテナを終了させ、restart: always で自動再起動させる。
    # /api/auth/session は認証不要で応答するため、アプリの生死確認に適している。
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/auth/session || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
