<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="300" fill="#0f3460"/>
  <rect x="50" y="60" width="300" height="180" fill="rgba(255,255,255,0.05)" rx="8"/>
  <line x1="60" y1="90" x2="340" y2="90" stroke="rgba(170,133,167,0.4)" stroke-width="1"/>
  <line x1="60" y1="120" x2="340" y2="120" stroke="rgba(170,133,167,0.4)" stroke-width="1"/>
  <line x1="60" y1="150" x2="340" y2="150" stroke="rgba(170,133,167,0.4)" stroke-width="1"/>
  <line x1="60" y1="180" x2="340" y2="180" stroke="rgba(170,133,167,0.4)" stroke-width="1"/>
  <line x1="60" y1="210" x2="340" y2="210" stroke="rgba(170,133,167,0.4)" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" fill="#aa85a7" font-size="18" font-family="Arial, sans-serif" font-weight="bold">擬似学習アルゴリズム</text>
  <text x="80" y="140" fill="rgba(255,255,255,0.7)" font-size="12" font-family="monospace">f(x) = Σ w_i · φ(x_i)</text>
  <text x="80" y="170" fill="rgba(170,133,167,0.9)" font-size="12" font-family="monospace">P(catch) = 1 - (1 - r)^n</text>
